name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Run Gradle tests
        run: .\gradlew.bat test --no-daemon

  frontend:
    name: Frontend build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: codeatlas-ui/package-lock.json

      - name: Install dependencies
        working-directory: codeatlas-ui
        run: npm ci

      - name: Build frontend
        working-directory: codeatlas-ui
        run: npm run build

  docs:
    name: Documentation checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required docs
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'docs/design.md',
            'docs/plan.md',
            'docs/task.md',
            'docs/development.md'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required document: $path"
            }
          }
